name: Feature request
description: Suggest a new capability or change
title: "feat: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: package
    attributes:
      label: Target package
      options:
        - "@autotranslate/core"
        - "@autotranslate/cli"
        - "@autotranslate/react"
        - "@autotranslate/next"
        - "@autotranslate/vite"
        - "@autotranslate/providers"
        - "@autotranslate/eslint-plugin"
        - "@autotranslate/zod"
        - new package
    validations: { required: true }
